<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:radial-gradient(ellipse at top,#1B2A6B 0%,#0D1640 45%,#070B26 100%);
  background-attachment:fixed;min-height:100vh;
  font-family:"Nunito","Arial",sans-serif;overflow-x:hidden;color:#1A0A3E;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.5) 0, transparent 50%),
                    radial-gradient(2px 2px at 70% 65%, rgba(255,255,255,.4) 0, transparent 50%),
                    radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,255,255,.3) 0, transparent 50%),
                    radial-gradient(1.5px 1.5px at 85% 20%, rgba(255,255,255,.3) 0, transparent 50%),
                    radial-gradient(1.5px 1.5px at 10% 60%, rgba(255,255,255,.35) 0, transparent 50%);
  background-size:100% 100%;
}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;}
.screen{width:100%;max-width:460px;padding:14px;margin:0 auto;position:relative;}
.apptitle{font-family:"Luckiest Guy","Arial Black",sans-serif;font-size:32px;letter-spacing:2px;color:#FFD93D;text-align:center;text-shadow:0 3px 0 rgba(0,0,0,.3);}
.statsbar{display:flex;justify-content:center;gap:10px;margin-top:10px;}
.statpill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:20px;padding:6px 16px;font-family:"Luckiest Guy",sans-serif;font-size:15px;letter-spacing:1px;}
.card{background:#fff;border-radius:22px;padding:16px;box-shadow:0 8px 28px rgba(0,0,0,.35);position:relative;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g2col{display:flex;flex-direction:column;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.btn{display:block;width:100%;padding:14px 16px;border:none;border-radius:16px;font-family:"Luckiest Guy",sans-serif;font-size:20px;letter-spacing:1.5px;cursor:pointer;text-align:center;transition:transform .1s;}
.btn:active{transform:scale(.95);}
.bp{background:linear-gradient(135deg,#6C3FC8,#9B6FE8);color:#fff;box-shadow:0 6px 18px rgba(108,63,200,.5);}
.bg2{background:rgba(255,255,255,.85);color:#4A3E7A;border:2px solid rgba(108,63,200,.25);}
.subjbtn{border:none;border-radius:22px;padding:22px 10px;color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 8px 22px rgba(0,0,0,.35);}
.subjlabel{font-family:"Luckiest Guy",sans-serif;font-size:18px;letter-spacing:1px;}
.arcadehome{background:linear-gradient(135deg,#FF8C00,#FF4757);color:#fff;box-shadow:0 6px 20px rgba(255,71,87,.4);}
.backbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:12px;padding:8px 16px;font-family:"Luckiest Guy",sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;margin-bottom:12px;}
.cathead{color:#fff;text-align:center;border-radius:18px;padding:16px;font-family:"Luckiest Guy",sans-serif;font-size:26px;letter-spacing:1.5px;margin-bottom:16px;box-shadow:0 6px 18px rgba(0,0,0,.3);}
.tierblock{margin-bottom:16px;}
.tierblock.locked{opacity:.45;}
.tiertitle{color:#fff;font-family:"Luckiest Guy",sans-serif;font-size:15px;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{font-family:"Nunito",sans-serif;font-weight:900;font-size:10px;letter-spacing:.5px;border-radius:10px;padding:3px 9px;white-space:nowrap;}
.badge.review{background:rgba(255,255,255,.18);color:#BFE8FF;}
.badge.new{background:linear-gradient(135deg,#FFD93D,#FF8C00);color:#3A1E00;}
.gametile{background:#fff;border:none;border-radius:16px;padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;position:relative;box-shadow:0 4px 14px rgba(0,0,0,.25);}
.gametile:disabled{cursor:not-allowed;}
.gtlabel{font-family:"Nunito",sans-serif;font-weight:800;font-size:11px;text-align:center;color:#2D1566;line-height:1.2;}
.donecheck{position:absolute;top:4px;right:4px;font-size:13px;}
.playhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.quitbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:12px;padding:7px 12px;font-family:"Luckiest Guy",sans-serif;font-size:13px;cursor:pointer;}
.playtitle{color:#fff;font-family:"Luckiest Guy",sans-serif;font-size:15px;letter-spacing:1px;}
.pw{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.pb{flex:1;height:10px;background:#eee;border-radius:10px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,#FFD93D,#FF8C00);border-radius:10px;transition:width .3s ease;}
.ps{font-family:"Luckiest Guy",sans-serif;font-size:16px;color:#E07000;white-space:nowrap;}
.nova{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:#F5F3FF;border-radius:14px;padding:8px 12px;}
.nova-face{font-size:26px;}
.nova-bubble{font-family:"Nunito",sans-serif;font-weight:800;font-size:13px;color:#5A4A8A;}
.qtext{font-family:"Nunito",sans-serif;font-weight:800;font-size:17px;color:#1A0A3E;text-align:center;line-height:1.45;margin-bottom:14px;background:#F7F5FF;border-radius:14px;padding:14px;}
.blank{display:inline-block;min-width:80px;border-bottom:3px solid #FF8C00;text-align:center;font-weight:900;color:#FF8C00;margin:0 4px;}
.passage{font-family:"Georgia",serif;font-size:15px;line-height:1.6;color:#3A2E5A;background:#FFF8F0;border-radius:14px;padding:14px;margin-bottom:12px;}
.ab{padding:14px 8px;border:2px solid #E0DCF0;border-radius:14px;font-family:"Nunito",sans-serif;font-weight:800;font-size:14px;cursor:pointer;text-align:center;background:#F8F8FC;color:#1A0A3E;min-height:54px;}
.ab.ok{background:#E8FFF4;border-color:#00D68F;color:#00A86B;}
.ab.no{background:#FFF0F2;border-color:#FF4757;color:#CC2F3E;}
.ab.dm{background:#F0F0F0;border-color:#ddd;color:#aaa;}
.tfbtn{flex:1;padding:16px 8px;border-radius:16px;border:2px solid #E0DCF0;background:#fff;font-family:"Luckiest Guy",sans-serif;font-size:19px;color:#1A0A3E;cursor:pointer;}
.fbwrap{text-align:center;margin-top:12px;}
.fbtxt{font-family:"Luckiest Guy",sans-serif;font-size:19px;letter-spacing:1px;}
.fbtxt.ok{color:#00D68F;}
.fbtxt.no{color:#FF4757;}
.fbtxt.no span{color:#1A0A3E;font-family:"Nunito",sans-serif;}
.fbexpl{font-family:"Nunito",sans-serif;font-size:12px;color:#8A7FA8;margin-top:4px;}
.nextbtn{width:100%;padding:12px;}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:34px;margin-bottom:8px;}
.chip{background:#fff;border:2px solid #DDD3F5;border-radius:14px;padding:8px 12px;font-family:"Nunito",sans-serif;font-weight:800;font-size:13px;cursor:pointer;color:#1A0A3E;}
.chip.sel{background:#2D1566;color:#fff;}
.chip.placed{opacity:.85;}
.chip.right{background:#E8FFF4;border-color:#00D68F;color:#00A86B;}
.chip.wrong{background:#FFF0F2;border-color:#FF4757;color:#CC2F3E;}
.bucket{flex:1;border-radius:16px;padding:10px 6px 14px;min-height:90px;border:2px solid #ddd;background:#FAFAFF;cursor:pointer;}
.bhead{font-family:"Luckiest Guy",sans-serif;font-size:12px;text-align:center;margin-bottom:6px;color:#6C3FC8;}
.scram-slots{display:flex;justify-content:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.scram-pool{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
.tile{width:38px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:"Nunito",sans-serif;font-weight:900;font-size:18px;}
.tile.filled{background:linear-gradient(135deg,#00D68F,#00E5A0);color:#fff;}
.tile.empty{background:rgba(0,0,0,.06);border:2px dashed rgba(0,0,0,.15);}
.tile.pool{background:linear-gradient(135deg,#6C3FC8,#9B6FE8);color:#fff;border:none;cursor:pointer;}
.matchgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.matchgrid.small{grid-template-columns:repeat(4,1fr);}
.matchcard{aspect-ratio:1;border-radius:10px;background:linear-gradient(135deg,#6C3FC8,#9B6FE8);border:none;color:transparent;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:2px;}
.matchcard.flip{background:#fff;border:2px solid #DDD3F5;color:#1A0A3E;font-size:9px;font-weight:800;font-family:"Nunito",sans-serif;text-align:center;}
.matchcard.found{background:#E8FFF4;border:2px solid #00D68F;color:#00A86B;}
.unlockbanner{background:linear-gradient(135deg,#FFD93D,#FF8C00);color:#1A0A3E;font-family:"Nunito",sans-serif;font-weight:900;font-size:13px;border-radius:14px;padding:10px;margin-top:14px;}
.arcadetile{border:none;border-radius:20px;padding:18px 8px;color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:0 6px 18px rgba(0,0,0,.3);}
.arcadedesc{font-family:"Nunito",sans-serif;font-size:10px;color:rgba(255,255,255,.9);text-align:center;}
.arcadewrap{display:flex;justify-content:center;}
#meteor-canvas{border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.4);touch-action:none;max-width:100%;}
.blitzbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.timerpill{background:#FFF0E0;color:#FF8C00;font-family:"Luckiest Guy",sans-serif;font-size:15px;border-radius:12px;padding:4px 12px;}
.patterngrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:260px;margin:0 auto;}
.patterntile{aspect-ratio:1;border:none;border-radius:20px;font-size:42px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:transform .1s;}
.patterntile:active{transform:scale(.92);}
.wc-circle{position:relative;width:230px;height:230px;margin:14px auto;touch-action:none;}
.wc-letter{position:absolute;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#6C3FC8,#9B6FE8);color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Luckiest Guy",sans-serif;font-size:22px;transform:translate(-50%,-50%);cursor:pointer;user-select:none;touch-action:none;box-shadow:0 4px 10px rgba(0,0,0,.3);}
.wc-letter.active{background:linear-gradient(135deg,#FFD93D,#FF8C00);color:#1A0A3E;}
.wc-word{text-align:center;font-family:"Luckiest Guy",sans-serif;font-size:26px;letter-spacing:3px;color:#1A0A3E;min-height:34px;margin-bottom:2px;}
.wc-word.ok{color:#00D68F;}
.wc-word.no{color:#FF4757;}
.wc-word.dupe{color:#FF8C00;}
.wc-found{text-align:center;font-family:"Nunito",sans-serif;font-weight:800;font-size:13px;color:#7A6FA0;margin-top:4px;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}
.ttsbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:12px;padding:7px 12px;font-size:16px;cursor:pointer;}
@keyframes confettiSpin{0%{transform:translateY(0) rotate(0);opacity:1;}100%{transform:translateY(340px) rotate(540deg);opacity:0;}}
@media (min-width:500px){.matchgrid{grid-template-columns:repeat(4,1fr);}}
</style>
</head>

// ============ UTILITIES ============
function sh(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function pk(a,n){return sh(a).slice(0,Math.min(n,a.length));}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function ri(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

let _voices=null;
if(typeof window!=='undefined'&&window.speechSynthesis){
  try{
    _voices=window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=()=>{_voices=window.speechSynthesis.getVoices();};
  }catch(e){}
}
function pickVoice(){
  if(!_voices||!_voices.length)return null;
  return _voices.find(v=>/en-US/i.test(v.lang)&&/female|samantha|zira|google us/i.test(v.name))
    || _voices.find(v=>/en-US/i.test(v.lang))
    || _voices.find(v=>/^en/i.test(v.lang))
    || _voices[0];
}
function speakText(text){
  try{
    if(!PROGRESS.ttsEnabled)return;
    if(typeof window==='undefined'||!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new window.SpeechSynthesisUtterance(text);
    const v=pickVoice(); if(v)u.voice=v;
    u.rate=0.95; u.pitch=1.03;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function stopSpeech(){try{if(window.speechSynthesis)window.speechSynthesis.cancel();}catch(e){}}
let _lastSpokenText='';
function autoReadCard(el){
  try{
    if(!PROGRESS.ttsEnabled)return;
    const card=el.querySelector('.card');
    if(!card)return;
    const passageEl=card.querySelector('.passage');
    const qtextEl=card.querySelector('.qtext');
    let text='';
    if(passageEl)text+=passageEl.textContent.trim()+'.  ';
    if(qtextEl)text+=qtextEl.textContent.trim();
    text=text.replace(/____/g,' blank ').replace(/\s+/g,' ').trim();
    if(!text||text===_lastSpokenText)return;
    _lastSpokenText=text;
    speakText(text);
  }catch(e){}
}

}

// ============ 2-BUCKET SORT ============
function playSort(el,pool,onDone){
  const rounds=pk(pool,Math.min(5,pool.length));
  let i=0,sc=0;
  function ir(){
    const r=rounds[i];
    let words=[...r.wordsA.map((w,j)=>({t:w,id:'a'+j,correct:'A',bucket:null})),...r.wordsB.map((w,j)=>({t:w,id:'b'+j,correct:'B',bucket:null}))];
    words=sh(words);
    let checked=false,sel=null;
    function advance(isOk){
      const ns=isOk?sc+1:sc;
      if(i+1>=rounds.length){onDone(ns,rounds.length);}else{sc=ns;i++;ir();}
    }
    function show(){
      const unsorted=words.filter(w=>w.bucket===null);
      const inA=words.filter(w=>w.bucket==='A'), inB=words.filter(w=>w.bucket==='B');
      const allSorted=words.every(w=>w.bucket!==null);
      const allCorrect=words.every(w=>w.bucket===w.correct);
      function chip(w){
        const isSel=sel===w.id;
        const isSorted=w.bucket!==null;
        const isR=checked&&w.bucket===w.correct;
        const isW=checked&&w.bucket!==null&&w.bucket!==w.correct;
        let cls='chip'+(isSel?' sel':'')+(isSorted&&!checked?' placed':'')+(isR?' right':'')+(isW?' wrong':'');
        return `<button class="${cls}" data-id="${w.id}">${w.t}</button>`;
      }
      el.innerHTML=`${progBar(i,rounds.length,sc)}<div class="card">
        ${i===0&&!checked?novaMsg('greet'):checked?novaMsg(allCorrect?'ok':'no'):''}
        <div class="qtext" style="margin-bottom:6px;">Tap a word, then tap the correct group!<span class="sr-only"> The groups are ${esc(r.categoryA)} and ${esc(r.categoryB)}.</span></div>
        ${unsorted.length?`<div class="chiprow">${unsorted.map(chip).join('')}</div>`:''}
        <div style="display:flex;gap:8px;margin-top:8px;">
          <div class="bucket" data-b="A"><div class="bhead">${r.categoryA}</div><div class="chiprow">${inA.map(chip).join('')}</div></div>
          <div class="bucket" data-b="B"><div class="bhead">${r.categoryB}</div><div class="chiprow">${inB.map(chip).join('')}</div></div>
        </div>
        ${!checked?`<button class="btn bp checkbtn" style="margin-top:12px;opacity:${allSorted?1:.4};" ${allSorted?'':'disabled'}>✓ CHECK</button>`:`<div class="fbwrap"><div class="fbtxt ${allCorrect?'ok':'no'}">${allCorrect?'🎉 PERFECT SORT!':'😅 CHECK HIGHLIGHTED'}</div></div>${!allCorrect?nextBtn():''}`}
      </div>`;
      autoReadCard(el);
      if(!checked){
        el.querySelectorAll('.chip').forEach(b=>b.addEventListener('click',()=>{
          const w=words.find(x=>x.id===b.dataset.id);
          if(w.bucket!==null){w.bucket=null;sel=null;show();return;}
          sel=(sel===w.id)?null:w.id;show();
        }));
        el.querySelectorAll('.bucket').forEach(b=>b.addEventListener('click',()=>{
          if(!sel)return;
          const w=words.find(x=>x.id===sel);
          w.bucket=b.dataset.b; sel=null; show();
        }));
        const cb=el.querySelector('.checkbtn');
        if(cb)cb.addEventListener('click',()=>{
          checked=true;
          allCorrect?playOK():playNo();
          show();
          if(allCorrect)setTimeout(()=>advance(true),800);
        });
      } else if(!allCorrect){
        const nb=el.querySelector('.nextbtn');
        if(nb)nb.addEventListener('click',()=>advance(false));
      }
    }
    show();
  }
  ir();
}

  let i=0,sc=0;
  function ir(){
    const r=rounds[i];
    const scrambled=(()=>{let a=r.word.split('');for(let k=0;k<3;k++)a=sh(a);return a;})();
    let letters=scrambled.map((c,j)=>({c,used:false,id:j}));
    let chosen=[],done2=false;
    function advance(isOk){
      const ns=isOk?sc+1:sc;
      if(i+1>=rounds.length){onDone(ns,rounds.length);}else{sc=ns;i++;ir();}
    }
    function show(){
      const ok=chosen.map(l=>l.c).join('').toLowerCase()===r.word.toLowerCase();
      el.innerHTML=`${progBar(i,rounds.length,sc)}<div class="card">
        ${i===0&&!done2?novaMsg('greet'):done2?novaMsg(ok?'ok':'no'):''}
        <div class="qtext" style="margin-bottom:10px;">💡 ${esc(r.hint)}</div>
        <div class="scram-slots">${chosen.map(l=>`<div class="tile filled">${l.c.toUpperCase()}</div>`).join('')}${Array.from({length:r.word.length-chosen.length}).map(()=>`<div class="tile empty"></div>`).join('')}</div>
        <div class="scram-pool">${letters.map(l=>`<button class="tile pool" data-id="${l.id}" style="${l.used?'visibility:hidden;':''}">${l.c.toUpperCase()}</button>`).join('')}</div>
        ${done2?`<div class="fbwrap"><div class="fbtxt ${ok?'ok':'no'}">${ok?'🎉 CORRECT!':'IT WAS: '+r.word.toUpperCase()}</div></div>${!ok?nextBtn():''}`:`<button class="btn bg2 resetbtn" style="margin-top:10px;">🔄 Reset</button>`}
      </div>`;
      autoReadCard(el);
      if(!done2){
        el.querySelectorAll('.pool').forEach(b=>b.addEventListener('click',()=>{
          const l=letters.find(x=>x.id==b.dataset.id);
          if(l.used)return;
          l.used=true; chosen.push(l); show();
          if(chosen.length===r.word.length){
            done2=true;
            const won=chosen.map(x=>x.c).join('').toLowerCase()===r.word.toLowerCase();
            won?playOK():playNo();
            show();
            if(won)setTimeout(()=>advance(true),700);
          }
        }));
        const rb=el.querySelector('.resetbtn');
        if(rb)rb.addEventListener('click',()=>{letters=letters.map(l=>({...l,used:false}));chosen=[];show();});
      } else if(!ok){
        const nb=el.querySelector('.nextbtn');
        if(nb)nb.addEventListener('click',()=>advance(false));
      }
    }
    show();
  }
  ir();
}

// ============ READING PASSAGE ============
function playPassage(el,pool,onDone){
  const rounds=pk(pool,Math.min(5,pool.length));
  let i=0,sc=0,chosen=null;
  function advance(isOk){
    const ns=isOk?sc+1:sc;
    if(i+1>=rounds.length){onDone(ns,rounds.length);}else{sc=ns;i++;chosen=null;show();}
  }
  function show(){
    const r=rounds[i];
    const rv=chosen!==null;
    const ok=rv&&chosen===r.a;
    el.innerHTML=`${progBar(i,rounds.length,sc)}<div class="card">
      ${i===0&&!rv?novaMsg('greet'):rv?novaMsg(ok?'ok':'no'):''}
      <div class="passage">${esc(r.p)}</div>
      <div class="qtext">${esc(r.q)}</div>
      <div class="g2col">${sh(r.c).map(c=>choiceBtn(c,c===r.a,chosen===c,rv)).join('')}</div>
      ${rv?feedback(ok,r.a):''}
      ${rv&&!ok?nextBtn():''}
    </div>`;
    autoReadCard(el);
    if(!rv)el.querySelectorAll('.mc').forEach(b=>b.addEventListener('click',()=>{
      chosen=b.dataset.c;
      const isOk=chosen===r.a;
      isOk?playOK():playNo();
      show();
      if(isOk)setTimeout(()=>advance(true),700);
    }));
    else if(!ok){const nb=el.querySelector('.nextbtn');if(nb)nb.addEventListener('click',()=>advance(false));}
  }
  show();
}

// ============ MEMORY MATCH (used both as a learning game & arcade) ============
function playMatchPairs(el,pool,onDone){
  const pairs=pk(pool,Math.min(6,pool.length));
  let cards=[];
  pairs.forEach((p,idx)=>{cards.push({id:idx+'a',text:p.a,pair:idx,found:false});cards.push({id:idx+'b',text:p.b,pair:idx,found:false});});
  cards=sh(cards);
  let flipped=[],lock=false,foundCount=0;
  function show(){
    el.innerHTML=`<div class="card">
      <div class="qtext">Tap two cards that go together!</div>
      <div class="matchgrid">${cards.map(c=>{
        const isFlipped=flipped.includes(c.id)||c.found;
        return `<button class="matchcard ${isFlipped?'flip':''} ${c.found?'found':''}" data-id="${c.id}">${isFlipped?esc(c.text):'❓'}</button>`;
      }).join('')}</div>
      <div class="ps" style="text-align:center;margin-top:8px;">Pairs found: ${foundCount}/${pairs.length}</div>
    </div>`;
    el.querySelectorAll('.matchcard').forEach(b=>b.addEventListener('click',()=>{
      if(lock)return;
      const c=cards.find(x=>x.id===b.dataset.id);
      if(c.found||flipped.includes(c.id))return;
      flipped.push(c.id); show();
      if(flipped.length===2){
        lock=true;
        const [c1,c2]=flipped.map(id=>cards.find(x=>x.id===id));
        if(c1.pair===c2.pair){
          c1.found=true;c2.found=true;foundCount++;playOK();
          setTimeout(()=>{flipped=[];lock=false;show();
            if(foundCount===pairs.length){onDone(pairs.length,pairs.length);}
          },500);
        } else {
          playNo();
          setTimeout(()=>{flipped=[];lock=false;show();},900);
        }
      }
    }));
  }
  show();
}

// ============ MATH GENERATORS ============
function mkNumChoices(ans){
  const set=new Set([String(ans)]);
  while(set.size<4){
    const delta=ri(1,Math.max(2,Math.round(Math.abs(ans)*0.2)+1));
    const v=Math.random()>.5?Number(ans)+delta:Number(ans)-delta;
    set.add(String(v));
  }
  return sh([...set]);
}
// ===== MATH GENERATORS — grounded in Common Core 4th/5th + Singapore Primary 5 =====
// Tier 1-3 = 4th grade review. Tier 4-5 = 5th grade preview.

// 4th review: place value & rounding (CCSS 4.NBT.A)
function genPlaceValue(lv){
  return Array.from({length:12},()=>{
    if(lv<=1){
      const n=ri(1000,98765); const ns=String(n);
      const posNames=['ones','tens','hundreds','thousands','ten thousands'];
      const idx=ri(0,ns.length-1); const digit=Number(ns[ns.length-1-idx]); const place=posNames[idx]||'ones';
      return {q:`In the number ${n.toLocaleString()}, what digit is in the ${place} place?`,a:String(digit),c:mkNumChoices(digit)};
    } else {
      const n=ri(1000,987654); const roundTo=rnd([10,100,1000]);
      const ansNum=Math.round(n/roundTo)*roundTo;
      const raw=mkNumChoices(ansNum);
      return {q:`Round ${n.toLocaleString()} to the nearest ${roundTo}.`,a:ansNum.toLocaleString(),c:raw.map(x=>Number(x).toLocaleString())};
    }
  });
}
// 4th review: multi-digit multiplication fluency (CCSS 4.NBT.B.5)
function genMultiDigit(lv){
  return Array.from({length:12},()=>{
    let a,b; if(lv<=1){a=ri(112,987);b=ri(2,9);} else {a=ri(11,89);b=ri(11,89);}
    const ans=a*b;
    return {q:`${a} × ${b} = ?`,a:String(ans),c:mkNumChoices(ans)};
  });
}
// 4th review: multi-digit division (CCSS 4.NBT.B.6)
function genDivision(lv){
  return Array.from({length:12},()=>{
    const b=ri(2,9); const q=lv<=1?ri(10,50):ri(15,99); const a=b*q;
    const withRem=lv>1&&Math.random()<0.35;
    if(withRem){const rem=ri(1,b-1); const dividend=a+rem; return {q:`${dividend} ÷ ${b} = ? (whole number — ignore the remainder)`,a:String(q),c:mkNumChoices(q)};}
    return {q:`${a} ÷ ${b} = ?`,a:String(q),c:mkNumChoices(q)};
  });
}
// 4th review: fraction equivalence & comparing (CCSS 4.NF.A)
function genFracEquiv(lv){
  return Array.from({length:12},()=>{
    if(Math.random()<.5){
      const d=rnd([2,3,4,5,6]); const n=ri(1,d-1); const mult=ri(2,4);
      const ans=`${n*mult}/${d*mult}`;
      const wrongs=sh([`${n*mult+1}/${d*mult}`,`${n}/${d*mult}`,`${n*mult}/${d*mult+1}`]);
      return {q:`Which fraction is equivalent to ${n}/${d}?`,a:ans,c:sh([ans,...wrongs])};
    } else {
      let n1,d1,n2,d2,v1,v2;
      do{d1=rnd([2,3,4,5,6,8]);d2=rnd([2,3,4,5,6,8]);n1=ri(1,d1-1);n2=ri(1,d2-1);v1=n1/d1;v2=n2/d2;}while(v1===v2);
      const bigger=v1>v2?`${n1}/${d1}`:`${n2}/${d2}`;
      return {q:`Which fraction is greater: ${n1}/${d1} or ${n2}/${d2}?`,a:bigger,c:[`${n1}/${d1}`,`${n2}/${d2}`]};
    }
  });
}
// 4th review: add/subtract fractions with the SAME denominator (CCSS 4.NF.B.3)
function genFracAddSub(lv){
  return Array.from({length:12},()=>{
    const d=rnd([2,3,4,5,6,8,10]); const n1=ri(1,d-1); const n2=ri(1,d-1);
    if(Math.random()<.5){const sum=n1+n2; const g=gcd(sum,d); return {q:`${n1}/${d} + ${n2}/${d} = ?`,a:`${sum/g}/${d/g}`,c:mkFracChoices(sum,d)};}
    const a1=Math.max(n1,n2),a2=Math.min(n1,n2);const diff=a1-a2;const g=gcd(diff||1,d);
    return {q:`${a1}/${d} - ${a2}/${d} = ?`,a:diff===0?'0':`${diff/g}/${d/g}`,c:mkFracChoices(diff,d)};
  });
}
// 4th review: factors & multiples (CCSS 4.OA.B.4)
function genFactors(lv){
  return Array.from({length:12},()=>{
    const n=lv<=1?rnd([12,16,18,20,24,30,36]):rnd([28,32,42,45,48,54,60,72]);
    const factorsOf=[]; for(let i=1;i<=n;i++) if(n%i===0) factorsOf.push(i);
    let nonFactor; do{nonFactor=ri(2,n+5);}while(factorsOf.includes(nonFactor));
    const correctFactor=rnd(factorsOf.filter(f=>f!==1&&f!==n))||factorsOf[1]||factorsOf[0];
    const pool=[...new Set([correctFactor,nonFactor,nonFactor+1,nonFactor+3])];
    return {q:`Which of these numbers is a factor of ${n}?`,a:String(correctFactor),c:sh(pool).map(String)};
  });
}
// 4th review: decimal notation to tenths/hundredths (CCSS 4.NF.C)
function genDecimals(lv){
  return Array.from({length:12},()=>{
    if(lv<=1){
      const a=(ri(1,90)/10).toFixed(1); const b=(ri(1,90)/10).toFixed(1);
      const sum=(parseFloat(a)+parseFloat(b)).toFixed(1);
      return {q:`${a} + ${b} = ?`,a:sum,c:mkNumChoices(sum)};
    }
    const a=(ri(10,98)/100).toFixed(2); const b=(ri(10,98)/100).toFixed(2);
    const bigger=parseFloat(a)>=parseFloat(b)?a:b;
    return {q:`Which decimal is greater: ${a} or ${b}?`,a:bigger,c:[a,b]};
  });
}
// 4th review: area & perimeter of rectangles (CCSS 4.MD.A.3)
function genAreaPerim(lv){
  return Array.from({length:12},()=>{
    const l=ri(3,15),w=ri(3,12);
    const t=lv<=1?'area':'perimeter';
    const ans=t==='area'?l*w:2*(l+w);
    return {q:`A rectangle is ${l} units long and ${w} units wide. What is its ${t}${t==='area'?' (sq units)':' (units)'}?`,a:String(ans),c:mkNumChoices(ans)};
  });
}
// 4th review: classifying angles (CCSS 4.MD.C.5-6)
function genAngles(lv){
  return Array.from({length:12},()=>{
    if(lv<=1){
      const deg=ri(1,179); const type=deg<90?'Acute':deg===90?'Right':'Obtuse';
      return {q:`An angle measuring ${deg}° is best classified as:`,a:type,c:['Acute','Right','Obtuse']};
    }
    const a1=ri(30,150); const ans=180-a1;
    return {q:`Two angles form a straight line. One angle is ${a1}°. What is the other angle?`,a:String(ans)+'°',c:mkNumChoices(ans).map(x=>x+'°')};
  });
}
// 5th NEW: add fractions with UNLIKE (related) denominators (CCSS 5.NF.A.1)
function genFracUnlike(lv){
  return Array.from({length:12},()=>{
    const pairs=[[2,4],[2,6],[3,6],[2,8],[4,8],[3,9],[5,10],[2,10]];
    const [dsmall,dbig]=rnd(pairs);
    const n1=ri(1,dsmall-1), n2=ri(1,dbig-1);
    const mult=dbig/dsmall; const commonNum=n1*mult+n2; const g=gcd(commonNum,dbig);
    return {q:`${n1}/${dsmall} + ${n2}/${dbig} = ?  (hint: rewrite ${n1}/${dsmall} with a denominator of ${dbig})`,a:`${commonNum/g}/${dbig/g}`,c:mkFracChoices(commonNum,dbig)};
  });
}
// 5th NEW: multiply a fraction by a whole number (CCSS 5.NF.B.4)
function genFracMultiply(lv){
  return Array.from({length:12},()=>{
    const d=rnd([2,3,4,5,6,8]); const n=ri(1,d-1); const w=ri(2,6);
    const num=n*w; const g=gcd(num,d);
    return {q:`${n}/${d} × ${w} = ?`,a:`${num/g}/${d/g}`,c:mkFracChoices(num,d)};
  });
}
// 5th NEW: basic order of operations / PEMDAS (CCSS 5.OA.A.1)
function genOrderOps(lv){
  return Array.from({length:12},()=>{
    const a=ri(2,9),b=ri(2,9),c=ri(2,9);
    let expr,ans;
    if(Math.random()<.5){expr=`${a} + ${b} × ${c}`; ans=a+b*c;} else {expr=`(${a} + ${b}) × ${c}`; ans=(a+b)*c;}
    return {q:`Solve using order of operations: ${expr}`,a:String(ans),c:mkNumChoices(ans)};
  });
}
// 5th NEW: percentage of a number (Singapore P5)
function genPercent(lv){
  return Array.from({length:12},()=>{
    const pct=rnd([10,20,25,50,75]); const base=rnd([20,40,60,80,100,200]);
    const ans=(pct/100)*base;
    return {q:`What is ${pct}% of ${base}?`,a:String(ans),c:mkNumChoices(ans)};
  });
}
// 5th NEW: ratio (Singapore P5)
function genRatio(lv){
  return Array.from({length:12},()=>{
    const r1=ri(2,5), r2=ri(2,5), mult=ri(2,6);
    const total1=r1*mult, ans=r2*mult;
    return {q:`The ratio of red to blue marbles is ${r1}:${r2}. If there are ${total1} red marbles, how many blue marbles are there?`,a:String(ans),c:mkNumChoices(ans)};
  });
}
// 5th NEW: volume of a rectangular prism (CCSS 5.MD.C, Singapore P5)
function genVolume(lv){
  return Array.from({length:12},()=>{
    const l=ri(2,10),w=ri(2,8),h=ri(2,6); const ans=l*w*h;
    return {q:`A rectangular box is ${l} cm long, ${w} cm wide, and ${h} cm tall. What is its volume? (length × width × height)`,a:String(ans)+' cm³',c:mkNumChoices(ans).map(x=>x+' cm³')};
  });
}

function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;}
function mkFracChoices(num,den){
  const g=gcd(num,den)||1; const simplified=`${num/g}/${den/g}`;
  const set=new Set([simplified]);
  while(set.size<4){const n2=Math.max(0,num+ri(-2,2));set.add(`${n2}/${den}`);}
  return sh([...set]);
}

function tierComplete(cat,tierIdx){
  const c=PROGRESS.completedGames;
  const tier=CATEGORIES[cat].tiers[tierIdx];
  if(!tier)return false;
  return tier.games.every(g=>c[cat+'|'+tierIdx+'|'+g]);
}
function isTierUnlocked(cat,tierIdx){
  if(tierIdx===0)return true;
  return tierComplete(cat,tierIdx-1);
}
function getUnlockedArcade(){
  const unlocked=[];
  for(const ag of ARCADE_GAMES){

  return unlocked;
}

// ============ METEOR DASH (canvas dodge/collect) ============
function startMeteorDash(el){
  el.innerHTML=`<div class="arcadewrap"><canvas id="meteor-canvas" width="380" height="520"></canvas></div>`;
  const canvas=document.getElementById('meteor-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  let player={x:W/2,targetX:W/2,y:H-50,w:34,h:34};
  let rocks=[],stars=[],particles=[];
  let lives=3,score=0,frame=0,over=false,spawnTimer=0,starTimer=0,speed=3.2;

  function spawnRock(){rocks.push({x:ri(20,W-20),y:-20,w:ri(26,42),vy:speed+Math.random()*1.5});}
  function spawnStar(){stars.push({x:ri(20,W-20),y:-20,r:10,vy:speed*0.9});}

  function loop(){
    frame++;
    ctx.fillStyle='#0A0E2E'; ctx.fillRect(0,0,W,H);
    // starfield bg
    for(let i=0;i<30;i++){const sx=(i*53+frame*0.5)%W, sy=(i*97)%H; ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(sx,sy,2,2);}

    player.x+=(player.targetX-player.x)*0.18;
    player.x=Math.max(20,Math.min(W-20,player.x));

    spawnTimer--; if(spawnTimer<=0){spawnRock();spawnTimer=Math.max(22,42-Math.floor(frame/200));}
    starTimer--; if(starTimer<=0){spawnStar();starTimer=ri(40,80);}

    rocks.forEach(r=>r.y+=r.vy); rocks=rocks.filter(r=>r.y<H+40);
    stars.forEach(s=>s.y+=s.vy); stars=stars.filter(s=>s.y<H+40);

    // draw rocks
    ctx.font='28px serif';
    rocks.forEach(r=>{ctx.fillText('☄️',r.x-14,r.y+10);});
    stars.forEach(s=>{ctx.fillText('⭐',s.x-12,s.y+10);});

    // draw player (rocket)
    ctx.font='30px serif';
    ctx.fillText('🚀',player.x-15,player.y+12);

    // collisions
    rocks.forEach(r=>{
      const dx=r.x-player.x, dy=r.y-player.y;
      if(Math.abs(dx)<24 && Math.abs(dy)<24){
        lives--; rocks=rocks.filter(x=>x!==r);
        if(lives<=0){over=true;}
      }
    });
    stars.forEach(s=>{
      const dx=s.x-player.x, dy=s.y-player.y;
      if(Math.abs(dx)<22 && Math.abs(dy)<22){
        score++; stars=stars.filter(x=>x!==s);
      }
    });

    // HUD
    ctx.fillStyle='#fff'; ctx.font='bold 16px sans-serif';
    ctx.fillText('⭐ '+score,10,26);
    ctx.fillText('❤️'.repeat(Math.max(0,lives)),W-70,26);

    if(over){
      ctx.fillStyle='rgba(0,0,0,.65)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#fff'; ctx.font='bold 26px sans-serif'; ctx.textAlign='center';
      ctx.fillText('GAME OVER',W/2,H/2-20);
      ctx.font='bold 20px sans-serif';
      ctx.fillText('⭐ Score: '+score,W/2,H/2+16);
      ctx.font='16px sans-serif';
      ctx.fillText('Tap to play again',W/2,H/2+50);
      ctx.textAlign='left';
      PROGRESS.stars+=score; saveProgress();
      canvas.addEventListener('click',()=>startMeteorDash(el),{once:true});
      return;
    }
    _arcadeRaf=requestAnimationFrame(loop);
  }
  function move(clientX){
    const rect=canvas.getBoundingClientRect();
    player.targetX=(clientX-rect.left)*(W/rect.width);
  }
  const onMove=e=>{const cx=e.touches?e.touches[0].clientX:e.clientX; move(cx);};
  canvas.addEventListener('mousemove',onMove);
  canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
  canvas.addEventListener('touchstart',e=>{onMove(e);},{passive:false});
  _arcadeCleanup=()=>{canvas.removeEventListener('mousemove',onMove);};
  loop();
}

// ============ QUIZ BLITZ (timed trivia sprint) ============
function allTriviaPool(){
  let pool=[];
  Object.values(GAME_DEFS).forEach(g=>{
    if(g.kind==='trivia')pool=pool.concat(g.data);
  });
  return pool;
}
function startQuizBlitz(el,hard){
  const pool=sh(allTriviaPool());
  let timeLeft=hard?45:60, score=0, idx=0, chosen=null, ended=false;
  function nextQ(){
    if(idx>=pool.length)idx=0;
    return pool[idx++];
  }
  let cur=nextQ();
  function draw(){
    if(ended)return;
    const choices=sh([cur.a,...(cur.c||[]).filter(x=>x!==cur.a)]).slice(0,4);
    el.innerHTML=`<div class="card">
      <div class="blitzbar"><div class="ps">⭐ ${score}</div><div class="timerpill">⏱ ${timeLeft}s</div></div>
      <div class="qtext">${esc(cur.q)}</div>
      <div class="g2">${choices.map(c=>`<button class="mc ab" data-c="${esc(c)}">${esc(c)}</button>`).join('')}</div>
    </div>`;
    el.querySelectorAll('.mc').forEach(b=>b.addEventListener('click',()=>{
      if(b.dataset.c===cur.a){score++;playOK();}else{playNo();}
      cur=nextQ(); draw();
    }));
  }
  _arcadeTimer=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){
      ended=true; clearInterval(_arcadeTimer);
      PROGRESS.stars+=score; saveProgress();
      el.innerHTML=`<div class="card" style="text-align:center;">
        <div style="font-size:60px;">🏆</div>
        <div class="apptitle" style="font-size:22px;">TIME'S UP!</div>
        <div class="ps" style="font-size:24px;margin:10px 0;">⭐ Final Score: ${score}</div>
        <button class="btn bp" id="blitzagain">🔄 PLAY AGAIN</button>
      </div>`;
      const ba=document.getElementById('blitzagain'); if(ba)ba.addEventListener('click',()=>startQuizBlitz(el,hard));
      return;
    }
    draw();
  },1000);
  draw();
}

// ============ MEMORY RUSH (timed match) ============
function startMemoryRush(el){
  const allPairs=[...VOCAB.slice(0,8).map(v=>({a:v.w,b:v.d})),...HISTORY_MATCH,...HISTORY_MATCH2];
  const pairs=pk(allPairs,8);
  let cards=[]; pairs.forEach((p,i)=>{cards.push({id:i+'a',t:p.a,pair:i,found:false});cards.push({id:i+'b',t:p.b,pair:i,found:false});});
  cards=sh(cards);
  let flipped=[],lock=false,found=0,timeLeft=60,ended=false;
  function draw(){
    if(ended)return;
    el.innerHTML=`<div class="card">
      <div class="blitzbar"><div class="ps">Pairs: ${found}/${pairs.length}</div><div class="timerpill">⏱ ${timeLeft}s</div></div>
      <div class="matchgrid small">${cards.map(c=>{
        const isF=flipped.includes(c.id)||c.found;
        return `<button class="matchcard ${isF?'flip':''} ${c.found?'found':''}" data-id="${c.id}">${isF?esc(c.t):'❓'}</button>`;
      }).join('')}</div>
    </div>`;
    el.querySelectorAll('.matchcard').forEach(b=>b.addEventListener('click',()=>{
      if(lock||ended)return;
      const c=cards.find(x=>x.id===b.dataset.id);
      if(c.found||flipped.includes(c.id))return;
      flipped.push(c.id); draw();
      if(flipped.length===2){
        lock=true;
        const [c1,c2]=flipped.map(id=>cards.find(x=>x.id===id));
        if(c1.pair===c2.pair){c1.found=true;c2.found=true;found++;playOK();
          setTimeout(()=>{flipped=[];lock=false;draw();
            if(found===pairs.length)finish(true);
          },450);
        } else {playNo();setTimeout(()=>{flipped=[];lock=false;draw();},800);}
      }
    }));
  }
  function finish(won){
    ended=true; clearInterval(_arcadeTimer);
    const scoreVal=found*10+(won?timeLeft*2:0);
    PROGRESS.stars+=scoreVal; saveProgress();
    el.innerHTML=`<div class="card" style="text-align:center;">
      <div style="font-size:60px;">${won?'🏆':'⏰'}</div>
      <div class="apptitle" style="font-size:22px;">${won?'ALL MATCHED!':"TIME'S UP!"}</div>
      <div class="ps" style="font-size:22px;margin:10px 0;">⭐ Score: ${scoreVal}</div>
      <button class="btn bp" id="memagain">🔄 PLAY AGAIN</button>
    </div>`;
    const ma=document.getElementById('memagain'); if(ma)ma.addEventListener('click',()=>startMemoryRush(el));
  }
  _arcadeTimer=setInterval(()=>{timeLeft--; if(timeLeft<=0){finish(false);}else{draw();}},1000);
  draw();
}

// ============ PATTERN BLITZ (Simon-says memory) ============
function startPatternBlitz(el){
  const TILES=[{id:0,emoji:'🔴',color:'#FF4757'},{id:1,emoji:'🔵',color:'#00A8FF'},{id:2,emoji:'🟡',color:'#FFD93D'},{id:3,emoji:'🟢',color:'#00D68F'}];
  let sequence=[],userIdx=0,level=0,showing=true,ended=false,activeTile=null;
  function draw(){
    if(ended)return;
    el.innerHTML=`<div class="card" style="text-align:center;">
      <div class="qtext" style="margin-bottom:10px;">${showing?'Watch closely...':'Your turn! Repeat the pattern.'}</div>
      <div class="ps" style="margin-bottom:10px;">Round: ${level}</div>
      <div class="patterngrid">${TILES.map(t=>`<button class="patterntile" data-id="${t.id}" style="background:${activeTile===t.id?'#fff':t.color};opacity:${activeTile===t.id?1:.85};" ${showing?'disabled':''}>${t.emoji}</button>`).join('')}</div>
    </div>`;
    if(!showing){
      el.querySelectorAll('.patterntile').forEach(b=>b.addEventListener('click',()=>{
        if(showing||ended)return;
        const id=parseInt(b.dataset.id);
        flashTile(id);
        if(id===sequence[userIdx]){
          userIdx++;
          if(userIdx===sequence.length){playOK();level++;setTimeout(nextRound,600);}
        } else {playNo();finish();}
      }));
    }
  }
  function flashTile(id){activeTile=id;draw();setTimeout(()=>{activeTile=null;if(!ended)draw();},250);}
  function playSequence(){
    showing=true;draw();
    let i=0;
    function step(){
      if(ended)return;
      if(i>=sequence.length){showing=false;userIdx=0;draw();return;}
      activeTile=sequence[i];draw();
      setTimeout(()=>{activeTile=null;draw();setTimeout(()=>{i++;step();},180);},480);
    }
    setTimeout(step,500);
  }
  function nextRound(){sequence.push(ri(0,3));playSequence();}
  function finish(){
    ended=true;
    PROGRESS.stars+=level;saveProgress();
    el.innerHTML=`<div class="card" style="text-align:center;">
      <div style="font-size:60px;">🎯</div>
      <div class="apptitle" style="font-size:22px;">GAME OVER</div>
      <div class="ps" style="font-size:22px;margin:10px 0;">You reached round ${level}!</div>
      <button class="btn bp" id="patternagain">🔄 PLAY AGAIN</button>
    </div>`;
    const pa=document.getElementById('patternagain'); if(pa)pa.addEventListener('click',()=>startPatternBlitz(el));
  }
  _arcadeCleanup=()=>{ended=true;};
  nextRound();
}

// ============ SORT RUSH (timed 2-bucket sorting) ============
function startSortRush(el){
  let timeLeft=45,score=0,ended=false,queue=[];
  function refillQueue(){
    const round=rnd(CATSORT_READING);
    const items=[...round.wordsA.map(w=>({word:w,correct:'A',catA:round.categoryA,catB:round.categoryB})),...round.wordsB.map(w=>({word:w,correct:'B',catA:round.categoryA,catB:round.categoryB}))];
    queue=queue.concat(sh(items));
  }
  refillQueue();
  let cur=queue.shift();
  function draw(){
    if(ended)return;
    el.innerHTML=`<div class="card">
      <div class="blitzbar"><div class="ps">⭐ ${score}</div><div class="timerpill">⏱ ${timeLeft}s</div></div>
      <div class="qtext" style="font-size:22px;">${esc(cur.word)}</div>
      <div style="display:flex;gap:10px;">
        <button class="btn bp sortbtn" data-b="A" style="flex:1;font-size:13px;padding:18px 6px;">${esc(cur.catA)}</button>
        <button class="btn bg2 sortbtn" data-b="B" style="flex:1;font-size:13px;padding:18px 6px;">${esc(cur.catB)}</button>
      </div>
    </div>`;
    el.querySelectorAll('.sortbtn').forEach(b=>b.addEventListener('click',()=>{
      if(ended)return;
      const ok=b.dataset.b===cur.correct;
      ok?(score++,playOK()):playNo();
      if(queue.length===0)refillQueue();
      cur=queue.shift();
      draw();
    }));
  }
  _arcadeTimer=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){
      ended=true;clearInterval(_arcadeTimer);
      PROGRESS.stars+=score;saveProgress();
      el.innerHTML=`<div class="card" style="text-align:center;">
        <div style="font-size:60px;">🗃️</div>
        <div class="apptitle" style="font-size:22px;">TIME'S UP!</div>
        <div class="ps" style="font-size:22px;margin:10px 0;">⭐ Sorted: ${score}</div>
        <button class="btn bp" id="sortagain">🔄 PLAY AGAIN</button>
      </div>`;
      const sa=document.getElementById('sortagain'); if(sa)sa.addEventListener('click',()=>startSortRush(el));
      return;
    }
    draw();
  },1000);
  draw();
}

// ============ WORD SPRINT (timed unscramble) ============
function startWordSprint(el){
  let timeLeft=60,score=0,ended=false;
  let pool=sh(SCRAMBLE_WORDS),idx=0;
  function nextWord(){ if(idx>=pool.length){pool=sh(SCRAMBLE_WORDS);idx=0;} return pool[idx++]; }
  function makeScramble(word){let a=word.split('');for(let k=0;k<3;k++)a=sh(a);return a.join('');}
  let cur=nextWord();
  let letters=makeScramble(cur.word).split('').map((c,j)=>({c,used:false,id:j}));
  let chosen=[];
  function draw(){
    if(ended)return;
    el.innerHTML=`<div class="card">
      <div class="blitzbar"><div class="ps">⭐ ${score}</div><div class="timerpill">⏱ ${timeLeft}s</div></div>
      <div class="qtext" style="margin-bottom:10px;">💡 ${esc(cur.hint)}</div>
      <div class="scram-slots">${chosen.map(l=>`<div class="tile filled">${l.c.toUpperCase()}</div>`).join('')}${Array.from({length:cur.word.length-chosen.length}).map(()=>`<div class="tile empty"></div>`).join('')}</div>
      <div class="scram-pool">${letters.map(l=>`<button class="tile pool" data-id="${l.id}" style="${l.used?'visibility:hidden;':''}">${l.c.toUpperCase()}</button>`).join('')}</div>
      <button class="btn bg2 skipbtn" style="margin-top:10px;">⏭️ Skip</button>
    </div>`;
    el.querySelectorAll('.pool').forEach(b=>b.addEventListener('click',()=>{
      if(ended)return;
      const l=letters.find(x=>x.id==b.dataset.id);
      if(l.used)return;
      l.used=true; chosen.push(l); draw();
      if(chosen.length===cur.word.length){
        const ans=chosen.map(x=>x.c).join('').toLowerCase();
        (ans===cur.word.toLowerCase())?(score++,playOK()):playNo();
        setTimeout(advance,400);
      }
    }));
    const skip=el.querySelector('.skipbtn');
    if(skip)skip.addEventListener('click',advance);
  }
  function advance(){
    if(ended)return;
    cur=nextWord();
    letters=makeScramble(cur.word).split('').map((c,j)=>({c,used:false,id:j}));
    chosen=[];
    draw();
  }
  _arcadeTimer=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){
      ended=true;clearInterval(_arcadeTimer);
      PROGRESS.stars+=score*2;saveProgress();
      el.innerHTML=`<div class="card" style="text-align:center;">
        <div style="font-size:60px;">🔤</div>
        <div class="apptitle" style="font-size:22px;">TIME'S UP!</div>
        <div class="ps" style="font-size:22px;margin:10px 0;">⭐ Words Solved: ${score}</div>
        <button class="btn bp" id="sprintagain">🔄 PLAY AGAIN</button>
      </div>`;
      const sa=document.getElementById('sprintagain'); if(sa)sa.addEventListener('click',()=>startWordSprint(el));
      return;
    }
    draw();
  },1000);
  draw();
}

// ============ WORD CIRCLE (drag through letters to spell words) ============
const WORD_CIRCLE_PUZZLES=[
  {letters:['R','E','L','P','A','S','T'],pangram:'PLASTER',words:[
    'ART','RAT','TAR','EAT','ATE','TEA','SEA','SET','LET','PET','PEA','PAL','LAP','RAP','PAR','EAR','ERA','ARE',
    'TALE','TEAL','LATE','LEAP','PEAL','PLEA','REAL','SEAL','SEAT','EAST','EATS','RATE','TEAR','TARP','TRAP','PART','RAPT','STAR','RATS','ARTS','TARS','PEST','PETS','STEP','SLAP','ALPS','PALS','LAPS',
    'PEARL','PLEAT','PLATE','STEAL','STALE','PASTE','LEAST','PLEAS',
    'PEARLS','PLATES','PETALS','PALEST','PASTEL','STAPLE',
    'PLASTER']},
  {letters:['P','L','A','N','E','T','S'],pangram:'PLANETS',words:[
    'ANT','ATE','EAT','TEA','SEA','SET','LET','NET','PET','PEA','PAL','LAP','TAN','TAP','PAN','NAP','ALE','APT','SAT',
    'PLAN','SNAP','SPAN','SPAT','SLAP','STEP','LEAN','LEAP','NEAT','ANTE','LATE','TALE','TEAL','SEAT','EAST','EATS','NEST','TENS','PENS','PLEA',
    'PLANE','PLANT','SLANT','STEAL','PLATE','PLEAT','LEAST','PANTS','PASTE',
    'PASTEL','STAPLE',
    'PLANETS']},
  {letters:['C','A','P','T','U','R','E'],pangram:'CAPTURE',words:[
    'CAT','CAP','CAR','ART','RAT','TAR','CUP','CUT','CUR','RUT','EAT','ATE','TEA','EAR','ERA','ARE','APT','RAP','PAR','PAT','TAP',
    'PACE','RACE','CARE','CURT','CURE','CAPE','TAPE','REAP','PEAR','PEAT','RATE','TEAR','TRAP','PART','CART','TRUE','CUTE',
    'CRATE','TRACE','CATER','REACT',
    'CARPET',
    'CAPTURE']},
];

function startWordCircle(el){
  const puzzle=rnd(WORD_CIRCLE_PUZZLES);
  const letters=sh(puzzle.letters);
  const n=letters.length;
  const positions=letters.map((_,i)=>{
    const angle=(i/n)*2*Math.PI-Math.PI/2;
    return {x:50+Math.cos(angle)*38,y:50+Math.sin(angle)*38};
  });
  let found=[],current=[],timeLeft=90,ended=false,dragging=false,flashState=null;

  function wordScore(w){if(w.length>=7)return 14;if(w.length===6)return 6;if(w.length===5)return 5;if(w.length===4)return 2;return 1;}
  function totalScore(){return found.reduce((s,w)=>s+wordScore(w),0);}

  function draw(){
    if(ended)return;
    const word=current.map(i=>letters[i]).join('');
    el.innerHTML=`<div class="card">
      <div class="blitzbar"><div class="ps">⭐ ${totalScore()}</div><div class="timerpill">⏱ ${timeLeft}s</div></div>
      <div class="wc-word ${flashState||''}">${word||'&nbsp;'}</div>
      <div class="wc-circle" id="wc-circle">
        ${letters.map((L,i)=>`<div class="wc-letter ${current.includes(i)?'active':''}" data-i="${i}" style="left:${positions[i].x}%;top:${positions[i].y}%;">${L}</div>`).join('')}
      </div>
      <div class="wc-found">Found ${found.length} word${found.length===1?'':'s'}${found.includes(puzzle.pangram)?' · 🌟 Pangram!':''}</div>
      <button class="btn bg2 wc-clear" style="margin-top:8px;">✖ Clear</button>
    </div>`;
    wireEvents();
  }

  function wireEvents(){
    const circle=document.getElementById('wc-circle');
    if(!circle)return;
    function letterAt(x,y){
      const elAt=document.elementFromPoint(x,y);
      if(elAt&&elAt.classList&&elAt.classList.contains('wc-letter'))return parseInt(elAt.dataset.i);
      return null;
    }
    function startDrag(x,y){
      dragging=true;current=[];flashState=null;
      const idx=letterAt(x,y);
      if(idx!==null)current.push(idx);
      draw();
    }
    function moveDrag(x,y){
      if(!dragging)return;
      const idx=letterAt(x,y);
      if(idx!==null&&!current.includes(idx)){current.push(idx);draw();}
    }
    function endDrag(){
      if(!dragging)return;
      dragging=false;
      submitWord();
    }
    circle.querySelectorAll('.wc-letter').forEach(elL=>{
      elL.addEventListener('pointerdown',e=>{e.preventDefault();startDrag(e.clientX,e.clientY);});
      elL.addEventListener('click',()=>{
        if(dragging)return;
        const idx=parseInt(elL.dataset.i);
        if(!current.includes(idx)){current.push(idx);draw();}
      });
    });
    circle.addEventListener('pointermove',e=>{if(dragging){e.preventDefault();moveDrag(e.clientX,e.clientY);}});
    circle.addEventListener('pointerup',()=>endDrag());
    circle.addEventListener('pointerleave',()=>{if(dragging)endDrag();});
    const clearBtn=el.querySelector('.wc-clear');
    if(clearBtn)clearBtn.addEventListener('click',()=>{current=[];flashState=null;draw();});
  }

  function submitWord(){
    const word=current.map(i=>letters[i]).join('').toUpperCase();
    if(word.length>=3&&puzzle.words.includes(word)&&!found.includes(word)){
      found.push(word);playOK();flashState='ok';
    } else if(found.includes(word)&&word.length>=3){
      flashState='dupe';
    } else if(word.length>0){
      flashState='no';playNo();
    }
    current=[];
    draw();
    setTimeout(()=>{if(!ended){flashState=null;draw();}},500);
  }

  _arcadeTimer=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){
      ended=true;clearInterval(_arcadeTimer);
      const finalScore=totalScore();
      PROGRESS.stars+=finalScore;saveProgress();
      el.innerHTML=`<div class="card" style="text-align:center;">
        <div style="font-size:60px;">⭕</div>
        <div class="apptitle" style="font-size:22px;">TIME'S UP!</div>
        <div class="ps" style="font-size:22px;margin:10px 0;">⭐ Score: ${finalScore}</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:800;color:#5A4A8A;margin-bottom:14px;font-size:13px;">You found ${found.length} word${found.length===1?'':'s'}: ${found.join(', ')||'—'}</div>
        <button class="btn bp" id="wcagain">🔄 PLAY AGAIN</button>
      </div>`;
      const wa=document.getElementById('wcagain'); if(wa)wa.addEventListener('click',()=>startWordCircle(el));
      return;
    }
    if(!dragging)draw();
  },1000);
  draw();
}

window.GAME_DEFS=GAME_DEFS; window.CATEGORIES=CATEGORIES; window.ARCADE_GAMES=ARCADE_GAMES;
window.startArcade=startArcade; window.stopArcade=stopArcade;
window.WORD_CIRCLE_PUZZLES=WORD_CIRCLE_PUZZLES;
window.speakText=speakText; window.autoReadCard=autoReadCard; window.toggleTTS=toggleTTS;
loadProgress();
render();
</script>
